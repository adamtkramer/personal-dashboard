<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" />
<script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
<style>
  :root {
    --bg: #f4f6fb;
    --bg-grad: radial-gradient(1200px 600px at 80% -10%, #e8eeff 0%, transparent 60%), var(--bg);
    --surface: #ffffff; --surface-2: #f0f3f9; --border: #e3e8f0;
    --text: #1a2233; --text-dim: #66708a;
    --accent: #4f7cff; --accent-soft: rgba(79,124,255,0.12);
    --green: #16a34a; --red: #dc2626;
    --shadow: 0 1px 2px rgba(16,24,40,0.04), 0 8px 24px rgba(16,24,40,0.06);
  }
  [data-theme="dark"] {
    --bg: #0b0f1a;
    --bg-grad: radial-gradient(1200px 600px at 80% -10%, #15203a 0%, transparent 60%), var(--bg);
    --surface: #121826; --surface-2: #1a2234; --border: #232c40;
    --text: #e7ecf5; --text-dim: #8b96ad;
    --accent: #6c8fff; --accent-soft: rgba(108,143,255,0.16);
    --green: #34d399; --red: #f87171;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 12px 30px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-grad); color: var(--text); min-height: 100vh;
    transition: background .3s ease, color .3s ease;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--surface) 85%, transparent);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #9b6cff);
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 18px;
  }
  .brand h1 { font-size: 17px; margin: 0; font-weight: 700; }
  .brand .sub { font-size: 12px; color: var(--text-dim); }
  .clock { text-align: center; }
  .clock .time { font-size: 24px; font-weight: 700; letter-spacing: .5px; font-variant-numeric: tabular-nums; }
  .clock .date { font-size: 12px; color: var(--text-dim); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn {
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    border-radius: 10px; padding: 9px 12px; cursor: pointer; font-size: 14px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; transition: all .15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.icon { padding: 9px 11px; }
  .grid-stack { margin: 14px; }
  .grid-stack-item-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); overflow: hidden auto; display: flex; flex-direction: column;
  }
  .widget-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: move;
  }
  .widget-head .title { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 14px; }
  .widget-head .title .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .widget-head .meta { font-size: 11px; color: var(--text-dim); font-weight: 600; }
  .widget-body { padding: 14px 16px; flex: 1; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .muted { color: var(--text-dim); font-size: 12px; }
  .pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: var(--surface-2); color: var(--text-dim); }
  .up { color: var(--green); } .down { color: var(--red); }
  .search { width: 100%; padding: 8px 11px; margin-bottom: 10px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 13px; }
  .search::placeholder { color: var(--text-dim); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 700; flex: none; }
  .stk-sym { font-weight: 700; }
  .stk-name { font-size: 11px; color: var(--text-dim); }
  .big { font-size: 22px; font-weight: 800; }
  .cal-event { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .cal-event:last-child { border-bottom: none; }
  .cal-date { flex: none; width: 46px; text-align: center; }
  .cal-date .d { font-size: 18px; font-weight: 800; line-height: 1; }
  .cal-date .m { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
  .cal-bar { width: 3px; border-radius: 3px; background: var(--accent); flex: none; }
  .news-item { display: block; padding: 9px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover .news-title { color: var(--accent); }
  .news-title { font-size: 13px; font-weight: 600; line-height: 1.35; }
  .news-src { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 9px; }
  .link-tile {
    display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px;
    border: 1px solid var(--border); border-radius: 12px; text-decoration: none; color: var(--text);
    background: var(--surface-2); font-size: 11px; font-weight: 600; text-align: center; position: relative;
  }
  .link-tile:hover { border-color: var(--accent); color: var(--accent); }
  .link-tile .fav { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 13px; }
  .link-del { position: absolute; top: -7px; right: -7px; width: 18px; height: 18px; border-radius: 50%; border: none; background: var(--red); color: #fff; font-size: 11px; cursor: pointer; display: none; line-height: 1; }
  .link-tile:hover .link-del { display: block; }
  .add-link { border-style: dashed; color: var(--text-dim); cursor: pointer; }
  .weather-now { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .weather-now .ico { font-size: 44px; }
  .weather-now .temp { font-size: 38px; font-weight: 800; line-height: 1; }
  .weather-days { display: flex; justify-content: space-between; gap: 6px; }
  .weather-day { text-align: center; font-size: 12px; flex: 1; }
  .weather-day .e { font-size: 22px; }
  .err { color: var(--red); font-size: 12px; }
  .loading { color: var(--text-dim); font-size: 13px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; }
  .overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 360px; max-width: 90vw;
    background: var(--surface); border-left: 1px solid var(--border); z-index: 101;
    transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; box-shadow: var(--shadow);
  }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { font-size: 16px; margin: 0; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
  .drawer-body { padding: 18px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .field .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .field input { width: 100%; padding: 9px 11px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 13px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .switch { position: relative; width: 42px; height: 24px; flex: none; }
  .switch input { display: none; }
  .switch .slider { position: absolute; inset: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; transition: .2s; }
  .switch .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  .switch input:checked + .slider:before { transform: translateX(18px); }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-dim); font-weight: 700; margin: 22px 0 8px; }
  .btn.block { width: 100%; justify-content: center; margin-top: 6px; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: .9; color: #fff; }
  a { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">D</div>
    <div>
      <h1>Personal Dashboard</h1>
      <div class="sub" id="greeting">Welcome back</div>
    </div>
  </div>
  <div class="clock">
    <div class="time" id="clock-time">--:--</div>
    <div class="date" id="clock-date">&mdash;</div>
  </div>
  <div class="header-actions">
    <button class="btn icon" id="theme-btn" title="Toggle theme">&#127769;</button>
    <button class="btn" id="refresh-btn" title="Refresh all data">&#8635; Refresh</button>
    <button class="btn" id="settings-btn">&#9881; Settings</button>
  </div>
</header>

<div class="grid-stack" id="grid"></div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Settings</h2>
    <button class="btn icon" id="drawer-close">&#10005;</button>
  </div>
  <div class="drawer-body">
    <div class="section-label">Visible widgets</div>
    <div id="widget-toggles"></div>
    <div class="section-label">Stocks</div>
    <div class="field">
      <label>Tickers (comma separated)</label>
      <input type="text" id="cfg-stocks" placeholder="AAPL, MSFT, NVDA, TSLA" />
    </div>
    <div class="field">
      <label>Alpha Vantage API key</label>
      <input type="password" id="cfg-stock-key" placeholder="Leave blank for demo data" />
      <div class="hint">Free key: alphavantage.co/support/#api-key</div>
    </div>
    <div class="section-label">News</div>
    <div class="field">
      <label>Topic / search</label>
      <input type="text" id="cfg-news-q" placeholder="technology" />
    </div>
    <div class="field">
      <label>NewsAPI key</label>
      <input type="password" id="cfg-news-key" placeholder="Leave blank for demo data" />
      <div class="hint">Free key: newsapi.org/register</div>
    </div>
    <div class="section-label">Weather</div>
    <div class="field">
      <label>City</label>
      <input type="text" id="cfg-weather-city" placeholder="San Francisco" />
      <div class="hint">Powered by Open-Meteo &mdash; no key needed.</div>
    </div>
    <button class="btn primary block" id="cfg-save">Save &amp; refresh</button>
    <button class="btn block" id="cfg-reset">Reset layout</button>
  </div>
</aside>

<script>
/* ===== STATE ===== */
var DEFAULTS = {
  theme: "light",
  stocks: "AAPL,MSFT,NVDA,TSLA,AMZN",
  stockKey: "", newsQ: "technology", newsKey: "", weatherCity: "San Francisco",
  visible: { stocks:true, email:true, calendar:true, news:true, weather:true, links:true },
  links: [
    { name:"Gmail", url:"https://mail.google.com", color:"#ea4335" },
    { name:"GitHub", url:"https://github.com", color:"#24292f" },
    { name:"Calendar", url:"https://calendar.google.com", color:"#1a73e8" },
    { name:"Drive", url:"https://drive.google.com", color:"#1fa463" },
    { name:"YouTube", url:"https://youtube.com", color:"#ff0000" }
  ],
  layout: null
};
var LS = "personal-dashboard-v1";
var S = loadState();
function loadState(){ try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(LS) || "{}")); } catch(e){ return Object.assign({}, DEFAULTS); } }
function saveState(){ localStorage.setItem(LS, JSON.stringify(S)); }

/* ===== HELPERS ===== */
function $(s, r){ return (r||document).querySelector(s); }
var palette = ["#4f7cff","#9b6cff","#16a34a","#ea580c","#0891b2","#db2777","#ca8a04","#475569"];
function colorFor(str){ var h=0; for(var i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))%palette.length; } return palette[h]; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]; }); }

/* ===== CLOCK ===== */
function tick(){
  var now = new Date();
  $("#clock-time").textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  $("#clock-date").textContent = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
  var h = now.getHours();
  $("#greeting").textContent = (h<12?"Good morning":h<18?"Good afternoon":"Good evening") + ", Adam";
}
setInterval(tick, 1000); tick();

/* ===== THEME ===== */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", S.theme);
  $("#theme-btn").textContent = S.theme === "dark" ? "☀️" : "🌙";
}
$("#theme-btn").onclick = function(){ S.theme = S.theme === "dark" ? "light" : "dark"; saveState(); applyTheme(); };
applyTheme();

/* ===== WIDGET DEFS ===== */
var WIDGETS = {
  stocks:  { title:"Portfolio",   icon:"📈", w:4, h:5, render:renderStocks },
  email:   { title:"Inbox",       icon:"✉️", w:4, h:5, render:renderEmail },
  calendar:{ title:"Upcoming",    icon:"📅", w:4, h:5, render:renderCalendar },
  news:    { title:"News",        icon:"📰", w:4, h:6, render:renderNews },
  weather: { title:"Weather",     icon:"🌤️", w:4, h:4, render:renderWeather },
  links:   { title:"Quick Links", icon:"🔖", w:4, h:4, render:renderLinks }
};
var ORDER = ["stocks","email","calendar","weather","news","links"];

var grid;
function buildGrid(){
  if(grid){ grid.destroy(false); }
  $("#grid").innerHTML = "";
  grid = GridStack.init({ cellHeight: 70, margin: 8, float: true, handle: ".widget-head" }, "#grid");
  var saved = S.layout || {};
  grid.batchUpdate();
  ORDER.forEach(function(key){
    if(!S.visible[key]) return;
    var def = WIDGETS[key];
    var pos = saved[key] || {};
    var item = document.createElement("div");
    item.className = "grid-stack-item";
    item.setAttribute("gs-id", key);
    item.setAttribute("gs-w", pos.w || def.w);
    item.setAttribute("gs-h", pos.h || def.h);
    if(pos.x != null) item.setAttribute("gs-x", pos.x);
    if(pos.y != null) item.setAttribute("gs-y", pos.y);
    item.innerHTML =
      '<div class="grid-stack-item-content" data-w="'+key+'">' +
        '<div class="widget-head">' +
          '<div class="title"><span class="dot"></span>'+def.icon+' '+def.title+'</div>' +
          '<div class="meta" id="meta-'+key+'"></div>' +
        '</div>' +
        '<div class="widget-body" id="body-'+key+'"><div class="loading">Loading…</div></div>' +
      '</div>';
    grid.el.appendChild(item);
    grid.makeWidget(item);
    def.render();
  });
  grid.commit();
  grid.on("change", persistLayout);
}
function persistLayout(){
  var map = {};
  grid.engine.nodes.forEach(function(n){ map[n.id] = { x:n.x, y:n.y, w:n.w, h:n.h }; });
  S.layout = map; saveState();
}

/* ===== STOCKS ===== */
var DEMO_STOCKS = {
  AAPL:{name:"Apple Inc.", price:228.52, chg:1.83}, MSFT:{name:"Microsoft", price:467.21, chg:0.94},
  NVDA:{name:"NVIDIA", price:131.05, chg:-2.11}, TSLA:{name:"Tesla", price:342.69, chg:3.42},
  AMZN:{name:"Amazon", price:212.34, chg:-0.58}, GOOGL:{name:"Alphabet", price:178.92, chg:1.12},
  META:{name:"Meta", price:701.44, chg:2.05}, SPY:{name:"S&P 500 ETF", price:598.11, chg:0.41}
};
function renderStocks(){
  var body = $("#body-stocks"); if(!body) return;
  var syms = S.stocks.split(",").map(function(s){ return s.trim().toUpperCase(); }).filter(Boolean);
  $("#meta-stocks").textContent = S.stockKey ? "live" : "demo";
  function finish(data){
    if(!data || !data.length){
      $("#meta-stocks").textContent = "demo";
      data = syms.map(function(sym){
        var d = DEMO_STOCKS[sym] || {name:sym, price:100+Math.random()*200, chg:(Math.random()*6-3)};
        return {sym:sym, name:d.name, price:d.price, chg:d.chg};
      });
    }
    var total = data.reduce(function(a,d){ return a+d.price; }, 0);
    var totChg = data.reduce(function(a,d){ return a+d.chg; }, 0) / data.length;
    body.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">' +
        '<div><div class="muted">Portfolio value (sample)</div><div class="big">$'+total.toLocaleString(undefined,{maximumFractionDigits:2})+'</div></div>' +
        '<div class="'+(totChg>=0?'up':'down')+'" style="font-weight:700">'+(totChg>=0?'▲':'▼')+' '+Math.abs(totChg).toFixed(2)+'%</div>' +
      '</div>' +
      data.map(function(d){ return '<div class="row">' +
          '<div><div class="stk-sym">'+escapeHtml(d.sym)+'</div><div class="stk-name">'+escapeHtml(d.name)+'</div></div>' +
          '<div style="text-align:right">' +
            '<div>$'+d.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+'</div>' +
            '<div class="'+(d.chg>=0?'up':'down')+'" style="font-size:12px;font-weight:700">'+(d.chg>=0?'+':'')+d.chg.toFixed(2)+'%</div>' +
          '</div></div>'; }).join("");
  }
  if(S.stockKey){
    var picks = syms.slice(0,5);
    Promise.all(picks.map(function(sym){
      return fetch("https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol="+sym+"&apikey="+S.stockKey)
        .then(function(r){ return r.json(); })
        .then(function(j){ var q=j["Global Quote"]||{}; return q["05. price"] ? {sym:sym,name:sym,price:+q["05. price"],chg:parseFloat(q["10. change percent"])} : null; })
        .catch(function(){ return null; });
    })).then(function(res){
      var data = res.filter(Boolean);
      if(!data.length){ $("#meta-stocks").textContent="demo (API limit?)"; }
      finish(data);
    });
  } else { finish(null); }
}

/* ===== EMAIL (mock) ===== */
var DEMO_EMAIL = [
  { from:"Sarah Chen", subj:"Q3 budget review — need your sign-off", time:"9:14 AM", unread:true, priority:true },
  { from:"GitHub", subj:"[dashboard] 3 new pull requests", time:"8:02 AM", unread:true, priority:false },
  { from:"Marcus Lee", subj:"Re: Offsite logistics", time:"Yesterday", unread:true, priority:false },
  { from:"Stripe", subj:"Your June payout is on the way", time:"Yesterday", unread:false, priority:false },
  { from:"Linda Park", subj:"URGENT: client demo moved to 2pm", time:"Yesterday", unread:true, priority:true },
  { from:"Notion", subj:"Weekly digest: 12 pages updated", time:"Mon", unread:false, priority:false },
  { from:"Recruiter", subj:"Senior role at Acme — quick chat?", time:"Mon", unread:true, priority:false }
];
function renderEmail(){
  var body = $("#body-email"); if(!body) return;
  var unread = DEMO_EMAIL.filter(function(e){ return e.unread; }).length;
  var priority = DEMO_EMAIL.filter(function(e){ return e.priority; }).length;
  $("#meta-email").textContent = "demo";
  body.innerHTML =
    '<input class="search" id="email-search" placeholder="Search inbox…" />' +
    '<div style="display:flex;gap:8px;margin-bottom:8px">' +
      '<span class="pill" style="background:var(--accent-soft);color:var(--accent)">'+unread+' unread</span>' +
      '<span class="pill">'+priority+' priority</span>' +
    '</div><div id="email-list"></div>';
  var list = $("#email-list");
  function draw(q){
    q = (q||"").toLowerCase();
    var items = DEMO_EMAIL.filter(function(e){ return (e.from+e.subj).toLowerCase().indexOf(q) > -1; });
    list.innerHTML = items.map(function(e){ return '<div class="row" style="align-items:flex-start">' +
        '<div class="avatar" style="background:'+colorFor(e.from)+'">'+escapeHtml(e.from[0])+'</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="display:flex;justify-content:space-between;gap:6px">' +
            '<span style="font-weight:'+(e.unread?'700':'500')+'">'+escapeHtml(e.from)+'</span>' +
            '<span class="muted" style="flex:none">'+escapeHtml(e.time)+'</span>' +
          '</div>' +
          '<div class="muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
            (e.priority?'<span style="color:var(--red)">●</span> ':'')+escapeHtml(e.subj) +
          '</div>' +
        '</div></div>'; }).join("") || '<div class="muted">No matches.</div>';
  }
  draw("");
  $("#email-search").oninput = function(ev){ draw(ev.target.value); };
}

/* ===== CALENDAR (hardcoded) ===== */
function renderCalendar(){
  var body = $("#body-calendar"); if(!body) return;
  $("#meta-calendar").textContent = "next 7 days";
  var today = new Date();
  var seed = [
    { off:0, time:"2:00 PM", title:"Client demo (moved up)", color:"#dc2626" },
    { off:0, time:"4:30 PM", title:"1:1 with Marcus", color:"#4f7cff" },
    { off:1, time:"10:00 AM", title:"Sprint planning", color:"#16a34a" },
    { off:2, time:"All day", title:"Q3 budget due", color:"#ca8a04" },
    { off:3, time:"9:00 AM", title:"Dentist", color:"#0891b2" },
    { off:4, time:"6:00 PM", title:"Team offsite dinner", color:"#9b6cff" },
    { off:6, time:"11:00 AM", title:"Board prep", color:"#db2777" }
  ];
  body.innerHTML = seed.map(function(ev){
    var d = new Date(today); d.setDate(d.getDate()+ev.off);
    return '<div class="cal-event">' +
        '<div class="cal-date"><div class="d">'+d.getDate()+'</div><div class="m">'+d.toLocaleDateString([], {month:'short'})+'</div></div>' +
        '<div class="cal-bar" style="background:'+ev.color+'"></div>' +
        '<div><div style="font-weight:600;font-size:13px">'+escapeHtml(ev.title)+'</div><div class="muted">'+escapeHtml(ev.time)+'</div></div>' +
      '</div>';
  }).join("");
}

/* ===== NEWS ===== */
var DEMO_NEWS = [
  { title:"AI chip demand pushes semiconductor revenues to record highs", src:"TechWire", url:"#" },
  { title:"Markets rally as inflation cools for third straight month", src:"Business Daily", url:"#" },
  { title:"New framework promises 2x faster web app load times", src:"DevPost", url:"#" },
  { title:"Major cloud provider announces region in South America", src:"CloudNews", url:"#" },
  { title:"Startups raise record Q2 funding despite cautious investors", src:"VentureBeat", url:"#" },
  { title:"Open-source model rivals proprietary leaders on benchmarks", src:"ML Weekly", url:"#" }
];
function renderNews(){
  var body = $("#body-news"); if(!body) return;
  $("#meta-news").textContent = S.newsKey ? "live" : "demo";
  function finish(articles){
    if(!articles || !articles.length){ $("#meta-news").textContent="demo"; articles = DEMO_NEWS; }
    body.innerHTML = '<input class="search" id="news-search" placeholder="Filter headlines…" /><div id="news-list"></div>';
    var list = $("#news-list");
    function draw(q){
      q = (q||"").toLowerCase();
      list.innerHTML = articles.filter(function(a){ return a.title && a.title.toLowerCase().indexOf(q) > -1; })
        .map(function(a){ return '<a class="news-item" href="'+escapeHtml(a.url)+'" target="_blank" rel="noopener">' +
            '<div class="news-title">'+escapeHtml(a.title)+'</div><div class="news-src">'+escapeHtml(a.src)+'</div></a>'; }).join("")
        || '<div class="muted">No matches.</div>';
    }
    draw("");
    $("#news-search").oninput = function(ev){ draw(ev.target.value); };
  }
  if(S.newsKey){
    fetch("https://newsapi.org/v2/everything?q="+encodeURIComponent(S.newsQ||"technology")+"&sortBy=publishedAt&pageSize=12&language=en&apiKey="+S.newsKey)
      .then(function(r){ return r.json(); })
      .then(function(j){
        if(j.status !== "ok") throw new Error(j.message||"request failed");
        finish((j.articles||[]).map(function(a){ return { title:a.title, src:(a.source&&a.source.name)||"", url:a.url }; }));
      })
      .catch(function(){ $("#meta-news").textContent="demo (API error)"; finish(null); });
  } else { finish(null); }
}

/* ===== WEATHER (Open-Meteo, no key) ===== */
var WCODE = { 0:["☀️","Clear"],1:["🌤️","Mainly clear"],2:["⛅","Partly cloudy"],3:["☁️","Overcast"],
  45:["🌫️","Fog"],48:["🌫️","Fog"],51:["🌦️","Drizzle"],53:["🌦️","Drizzle"],55:["🌧️","Drizzle"],
  61:["🌧️","Rain"],63:["🌧️","Rain"],65:["🌧️","Heavy rain"],71:["🌨️","Snow"],73:["🌨️","Snow"],75:["❄️","Heavy snow"],
  80:["🌦️","Showers"],81:["🌧️","Showers"],82:["⛈️","Violent showers"],95:["⛈️","Thunderstorm"],96:["⛈️","Thunderstorm"],99:["⛈️","Thunderstorm"] };
function renderWeather(){
  var body = $("#body-weather"); if(!body) return;
  fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(S.weatherCity)+"&count=1")
    .then(function(r){ return r.json(); })
    .then(function(g){
      if(!g.results || !g.results.length) throw new Error("city not found");
      var loc = g.results[0];
      $("#meta-weather").textContent = loc.name;
      return fetch("https://api.open-meteo.com/v1/forecast?latitude="+loc.latitude+"&longitude="+loc.longitude+"&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=5").then(function(r){ return r.json(); });
    })
    .then(function(w){
      var cur = w.current; var code = WCODE[cur.weather_code] || ["❓","—"];
      var html = '<div class="weather-now"><div class="ico">'+code[0]+'</div>' +
        '<div><div class="temp">'+Math.round(cur.temperature_2m)+'°</div><div class="muted">'+code[1]+'</div></div></div>' +
        '<div class="weather-days">';
      for(var i=0;i<w.daily.time.length;i++){
        var dc = WCODE[w.daily.weather_code[i]] || ["❓"];
        var day = new Date(w.daily.time[i]).toLocaleDateString([], {weekday:'short'});
        html += '<div class="weather-day"><div>'+escapeHtml(day)+'</div><div class="e">'+dc[0]+'</div>' +
          '<div style="font-weight:700">'+Math.round(w.daily.temperature_2m_max[i])+'°</div>' +
          '<div class="muted">'+Math.round(w.daily.temperature_2m_min[i])+'°</div></div>';
      }
      body.innerHTML = html + '</div>';
    })
    .catch(function(e){ body.innerHTML = '<div class="err">Weather error: '+escapeHtml(e.message)+'</div>'; });
}

/* ===== QUICK LINKS ===== */
function renderLinks(){
  var body = $("#body-links"); if(!body) return;
  $("#meta-links").textContent = String(S.links.length);
  body.innerHTML = '<div class="links-grid">' +
    S.links.map(function(l,i){ return '<a class="link-tile" href="'+escapeHtml(l.url)+'" target="_blank" rel="noopener">' +
        '<button class="link-del" data-i="'+i+'" title="Remove">✕</button>' +
        '<span class="fav" style="background:'+(l.color||colorFor(l.name))+'">'+escapeHtml(l.name[0]||'?')+'</span>' +
        escapeHtml(l.name) + '</a>'; }).join("") +
    '<div class="link-tile add-link" id="add-link"><span class="fav" style="background:var(--text-dim)">＋</span>Add</div>' +
    '</div>';
  Array.prototype.forEach.call(body.querySelectorAll(".link-del"), function(b){
    b.onclick = function(e){ e.preventDefault(); e.stopPropagation(); S.links.splice(+b.dataset.i,1); saveState(); renderLinks(); };
  });
  $("#add-link").onclick = function(){
    var name = prompt("Link name:"); if(!name) return;
    var url = prompt("URL:"); if(!url) return;
    if(!/^https?:\/\//.test(url)) url = "https://"+url;
    S.links.push({ name:name, url:url, color: colorFor(name) }); saveState(); renderLinks();
  };
}

/* ===== REFRESH ===== */
function refreshAll(){ ["stocks","news","weather"].forEach(function(k){ if(S.visible[k]) WIDGETS[k].render(); }); }
$("#refresh-btn").onclick = refreshAll;
setInterval(function(){ if(S.visible.stocks) renderStocks(); }, 60000);
setInterval(function(){ if(S.visible.weather) renderWeather(); }, 600000);
setInterval(function(){ if(S.visible.news) renderNews(); }, 900000);

/* ===== SETTINGS DRAWER ===== */
function openDrawer(){
  $("#cfg-stocks").value = S.stocks; $("#cfg-stock-key").value = S.stockKey;
  $("#cfg-news-q").value = S.newsQ; $("#cfg-news-key").value = S.newsKey;
  $("#cfg-weather-city").value = S.weatherCity;
  var tg = $("#widget-toggles"); tg.innerHTML = "";
  ORDER.forEach(function(key){
    var def = WIDGETS[key];
    var row = document.createElement("div"); row.className = "toggle-row";
    row.innerHTML = '<span>'+def.icon+' '+def.title+'</span>' +
      '<label class="switch"><input type="checkbox" data-k="'+key+'" '+(S.visible[key]?'checked':'')+'><span class="slider"></span></label>';
    tg.appendChild(row);
  });
  Array.prototype.forEach.call(tg.querySelectorAll("input"), function(inp){
    inp.onchange = function(){ S.visible[inp.dataset.k] = inp.checked; saveState(); buildGrid(); };
  });
  $("#overlay").classList.add("open"); $("#drawer").classList.add("open");
}
function closeDrawer(){ $("#overlay").classList.remove("open"); $("#drawer").classList.remove("open"); }
$("#settings-btn").onclick = openDrawer;
$("#drawer-close").onclick = closeDrawer;
$("#overlay").onclick = closeDrawer;
$("#cfg-save").onclick = function(){
  S.stocks = $("#cfg-stocks").value || DEFAULTS.stocks;
  S.stockKey = $("#cfg-stock-key").value.trim();
  S.newsQ = $("#cfg-news-q").value || DEFAULTS.newsQ;
  S.newsKey = $("#cfg-news-key").value.trim();
  S.weatherCity = $("#cfg-weather-city").value || DEFAULTS.weatherCity;
  saveState(); closeDrawer(); refreshAll();
};
$("#cfg-reset").onclick = function(){ S.layout = null; saveState(); buildGrid(); closeDrawer(); };

/* ===== INIT ===== */
buildGrid();
</script>
</body>
</html>
